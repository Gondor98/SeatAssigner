<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Seat Assigner</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="landing-page">
    <div class="garden-overlay"></div>
    <div class="landing-container">
        <div class="landing-card">
            <div class="ornament top-ornament">✦</div>
            <h1 class="landing-title">Chào Mừng</h1>
            <p class="landing-subtitle">Hệ thống xếp chỗ ngồi tiệc cưới</p>
            <div class="landing-divider">
                <span class="divider-leaf">🌿</span>
            </div>
            <div class="landing-buttons">
                <a href="admin.html" class="btn btn-admin">
                    <span class="btn-icon">⚙️</span>
                    <span class="btn-text">
                        <strong>Quản lý</strong>
                        <small>Thiết lập & Cấu hình</small>
                    </span>
                </a>
                <a href="guest.html" class="btn btn-guest">
                    <span class="btn-icon">🪑</span>
                    <span class="btn-text">
                        <strong>Tìm chỗ ngồi</strong>
                        <small>Dành cho khách mời</small>
                    </span>
                </a>
            </div>
            <div class="ornament bottom-ornament">✦</div>
        </div>
    </div>

</html>
