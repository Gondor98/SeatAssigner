<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm chỗ ngồi - Wedding Seat Assigner</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="guest-page">
    <header class="page-header">
        <h1>💒 Tìm chỗ ngồi</h1>
        <span id="event-name" style="font-family: 'Lora', serif; color: var(--text-muted);"></span>
    </header>

    <div class="guest-search-container">
        <!-- Step 1: Name Search -->
        <div id="step-search" class="guest-step">
            <div class="guest-welcome">
                <h1>Xin chào quý khách!</h1>
                <p>Vui lòng nhập tên để tìm bàn tiệc của bạn</p>
            </div>

            <div class="search-box">
                <div class="search-input-wrapper">
                    <input
                        type="text"
                        id="name-input"
                        class="search-input"
                        placeholder="Nhập họ tên..."
                        autocomplete="off"
                        autofocus
                    >
                    <button class="search-btn" id="search-btn">🔍</button>
                </div>
                <ul class="suggestions-list" id="suggestions" style="display: none;"></ul>
            </div>
        </div>

        <!-- Step 2: Confirm Party Size -->
        <div id="step-party-size" class="guest-step" style="display: none;">
            <div class="card" style="text-align: center; max-width: 400px; margin: 0 auto;">
                <p class="result-name" id="checkin-name" style="margin-bottom: 0.5rem;"></p>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
                    Số người đăng ký: <strong id="expected-size"></strong>
                </p>
                <div class="form-group" style="text-align: left;">
                    <label for="actual-size-input">Số người thực tế đến hôm nay:</label>
                    <input type="number" id="actual-size-input" class="form-control" 
                           min="1" max="20" style="text-align: center; font-size: 1.3rem; font-weight: 600;">
                </div>
                <button class="btn-primary" id="confirm-size-btn" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    ✓ Xác nhận
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div class="spinner" id="loading-spinner"></div>

        <!-- Step 3: Result -->
        <div id="step-result" class="guest-step" style="display: none;">
            <div class="result-container visible">
                <div class="result-card">
                    <p class="result-name" id="result-name"></p>
                    <p class="result-table-number" id="result-table-number"></p>
                    <p class="result-table-label">Số bàn của bạn</p>

                    <!-- Reassignment notice -->
                    <div id="reassignment-notice" style="display: none; margin-bottom: 1rem;">
                        <div class="status-message status-info" style="font-size: 0.85rem; text-align: left;">
                            <strong>📋 Đã tối ưu chỗ ngồi:</strong>
                            <span id="reassignment-text"></span>
                        </div>
                    </div>

                    <!-- Mini Table Map -->
                    <div id="guest-table-map" style="margin-top: 1rem;"></div>
                </div>
            </div>
        </div>

        <!-- Not Found -->
        <div id="step-not-found" class="guest-step" style="display: none;">
            <div class="card" style="text-align: center;">
                <p style="font-size: 2rem; margin-bottom: 0.5rem;">😔</p>
                <p style="color: var(--text-secondary);">
                    Không tìm thấy tên trong danh sách.<br>
                    Vui lòng kiểm tra lại hoặc liên hệ cô dâu/chú rể.
                </p>
                <button class="btn-primary" id="retry-btn" style="margin-top: 1rem;">
                    🔄 Thử lại
                </button>
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="js/config.js?v=3"></script>
    <script src="js/sheets-api.js?v=3"></script>
    <script src="js/name-matcher.js?v=3"></script>
    <script src="js/table-renderer.js?v=3"></script>
    <script src="js/dynamic-assigner.js?v=2"></script>
    <script src="js/guest.js?v=4"></script>
</body>
</html>
